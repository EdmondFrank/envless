name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: pin zig version
        id: zig
        run: echo "version=$(cat zig/.zigversion)" >> "$GITHUB_OUTPUT"

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ steps.zig.outputs.version }}

      - name: zig build release
        working-directory: zig
        run: zig build release -Dversion=${{ github.ref_name }}

      - name: verify dist artifacts
        run: |
          ls -la dist/
          test -f dist/checksums.txt
          # Sanity: there must be one tarball per release target plus the
          # checksums file. The release step builds 4 targets.
          tar_count=$(find dist -name 'envless_*.tar.gz' | wc -l)
          if [ "$tar_count" -ne 4 ]; then
            echo "expected 4 tarballs, got $tar_count" >&2
            exit 1
          fi
          cat dist/checksums.txt

      - name: publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
